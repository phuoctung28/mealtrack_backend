# Render Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code
#
# To apply: push this file to main. Render detects it automatically.
# Env var groups referenced here must exist in the Render dashboard first.

services:
  # ── Web service ────────────────────────────────────────────────────────────
  - type: web
    name: mealtrack-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT --workers 4
    envVars:
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CACHE_ENABLED
        value: "true"

  # ── Push notification cron  (every 2 minutes) ──────────────────────────────
  - type: cron
    name: mealtrack-cron-push
    runtime: python
    schedule: "*/2 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.cron.push
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production

  # ── Email lifecycle cron  (daily at 09:00 UTC = 16:00 ICT) ────────────────
  - type: cron
    name: mealtrack-cron-email
    runtime: python
    schedule: "0 9 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.cron.email
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ENVIRONMENT
        value: production
