version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mealtrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutree
      POSTGRES_USER: nutree
      POSTGRES_PASSWORD: nutree
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutree -d nutree"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mealtrack_redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: mealtrack_postgres_data
  redis_data:
    name: mealtrack_redis_data
