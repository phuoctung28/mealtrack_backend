name: Meal Image Resolver

on:
  schedule:
    # 02:00 Asia/Ho_Chi_Minh = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch: {}  # manual trigger for testing

concurrency:
  group: meal-image-resolver
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-ml.txt') }}

      - name: Cache SigLIP model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-siglip-base-patch16-224

      - name: Install dependencies
        run: pip install -r requirements-ml.txt

      - name: Run resolver
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FIREBASE_CREDENTIALS: ""  # not needed for this script
          MEAL_IMAGE_CACHE_ENABLED: "true"
        run: python scripts/resolve_pending_images.py
