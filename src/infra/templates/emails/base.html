<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{{ subject }}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Reset */
    * { box-sizing: border-box; }
    body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }

    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      color: #2D2926;
      background: linear-gradient(165deg, #F5F2ED 0%, #E8E4DF 25%, #FAF9F6 50%, #F0EDE8 75%, #FAF9F6 100%);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      line-height: 1.15;
      color: #2D2926;
    }

    p { margin: 0 0 16px 0; }
    a { color: #5A7D66; text-decoration: none; }

    /* Liquid Glass Container */
    .liquid-glass {
      background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.88) 50%, rgba(250,249,246,0.92) 100%);
      border-radius: 28px;
      border: 1px solid rgba(107, 143, 119, 0.12);
      box-shadow:
        0 2px 4px rgba(45, 41, 38, 0.03),
        0 8px 16px rgba(45, 41, 38, 0.04),
        0 24px 48px rgba(45, 41, 38, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(107, 143, 119, 0.05);
    }

    /* Shimmer overlay for glass effect */
    .glass-shimmer {
      background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.3) 100%);
    }

    /* Liquid Glass Card (inner) */
    .glass-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.7) 0%, rgba(250,249,246,0.5) 100%);
      border-radius: 20px;
      border: 1px solid rgba(107, 143, 119, 0.08);
      box-shadow:
        0 1px 3px rgba(45, 41, 38, 0.04),
        0 4px 12px rgba(45, 41, 38, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    /* Gradient stat display */
    .gradient-text {
      background: linear-gradient(135deg, #4A6D5A 0%, #5A7D66 30%, #6B8F77 60%, #29B6A1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Primary CTA - Liquid Glass Button */
    .btn-liquid {
      display: inline-block;
      background: linear-gradient(135deg, #4A6D5A 0%, #5A7D66 40%, #6B8F77 70%, #29B6A1 100%);
      color: #FFFFFF !important;
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none !important;
      padding: 18px 40px;
      border-radius: 16px;
      box-shadow:
        0 4px 8px rgba(90, 125, 102, 0.2),
        0 8px 24px rgba(90, 125, 102, 0.25),
        0 16px 48px rgba(90, 125, 102, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      letter-spacing: 0.3px;
    }

    /* Secondary Button */
    .btn-glass {
      display: inline-block;
      background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(250,249,246,0.8) 100%);
      color: #5A7D66 !important;
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none !important;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid rgba(107, 143, 119, 0.2);
      box-shadow:
        0 2px 8px rgba(45, 41, 38, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    /* Badge styles */
    .badge-glow {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(165deg, #0F1F1A 0%, #1A2E28 50%, #0F1F1A 100%) !important; }
      .liquid-glass {
        background: linear-gradient(145deg, rgba(28,43,38,0.95) 0%, rgba(20,50,50,0.88) 100%) !important;
        border-color: rgba(255,255,255,0.08) !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 24px 64px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05) !important;
      }
      .glass-card {
        background: linear-gradient(160deg, rgba(15,31,26,0.8) 0%, rgba(28,43,38,0.6) 100%) !important;
        border-color: rgba(255,255,255,0.06) !important;
      }
      h1, h2, h3, p, td { color: #F8F5F0 !important; }
      .text-secondary { color: #9BA8A3 !important; }
      .gradient-text { background: linear-gradient(135deg, #29B6A1 0%, #34D399 100%) !important; -webkit-background-clip: text !important; }
      .btn-liquid { background: linear-gradient(135deg, #1E8B75 0%, #29B6A1 60%, #34D399 100%) !important; }
    }

    /* Mobile */
    @media only screen and (max-width: 600px) {
      .email-wrapper { padding: 16px !important; }
      .liquid-glass { border-radius: 24px !important; }
      .content-padding { padding: 32px 24px !important; }
      h1 { font-size: 28px !important; }
      .stat-huge { font-size: 52px !important; }
      .btn-liquid { padding: 16px 32px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background: linear-gradient(165deg, #F5F2ED 0%, #E8E4DF 25%, #FAF9F6 50%, #F0EDE8 75%, #FAF9F6 100%);">

  <!-- Preheader -->
  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">
    {% block preheader %}{% endblock %}
    &#847; &#847; &#847; &#847; &#847; &#847; &#847; &#847;
  </div>

  <!-- Email Wrapper -->
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background: linear-gradient(165deg, #F5F2ED 0%, #E8E4DF 25%, #FAF9F6 50%, #F0EDE8 75%, #FAF9F6 100%);">
    <tr>
      <td align="center" class="email-wrapper" style="padding: 48px 20px;">

        <!-- Email Container -->
        <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%;">

          <!-- Logo Header - Ethereal Floating Effect -->
          <tr>
            <td align="center" style="padding-bottom: 36px;">
              <a href="https://app.nutree.app?source=email" style="text-decoration: none;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center">
                      <!-- Soft ambient glow -->
                      <table role="presentation" cellpadding="0" cellspacing="0" style="background: radial-gradient(circle at 50% 50%, rgba(41, 182, 161, 0.12) 0%, rgba(90, 125, 102, 0.06) 50%, transparent 75%); border-radius: 50%; padding: 16px;">
                        <tr>
                          <td>
                            <!-- Inner luminous halo -->
                            <table role="presentation" cellpadding="0" cellspacing="0" style="background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.9) 0%, rgba(209, 250, 229, 0.4) 40%, transparent 70%); border-radius: 50%; padding: 6px; box-shadow: 0 0 30px rgba(41, 182, 161, 0.2), 0 0 60px rgba(90, 125, 102, 0.1);">
                              <tr>
                                <td style="padding: 4px;">
                                  <img src="https://res.cloudinary.com/dgjc77gau/image/upload/v1778347490/app-icon-transparent_crzm5v.png" alt="Nutree" width="56" height="56" style="display: block; border: 0;">
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <!-- Brand name + tagline -->
                  <tr>
                    <td align="center" style="padding-top: 14px;">
                      <p style="font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin: 0; background: linear-gradient(135deg, #4A6D5A 0%, #5A7D66 50%, #29B6A1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: #5A7D66;">
                        nutree
                      </p>
                      <p style="font-family: 'DM Sans', -apple-system, sans-serif; font-size: 12px; font-weight: 500; color: #7A7470; letter-spacing: 1.5px; text-transform: uppercase; margin: 6px 0 0 0;">
                        Eat smarter · Live better
                      </p>
                    </td>
                  </tr>
                </table>
              </a>
            </td>
          </tr>

          <!-- Main Content - Liquid Glass Card -->
          <tr>
            <td>
              <!-- Outer glow layer -->
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background: linear-gradient(145deg, rgba(107, 143, 119, 0.03) 0%, rgba(41, 182, 161, 0.02) 100%); border-radius: 32px; padding: 4px;">
                <tr>
                  <td>
                    <!-- Main glass container -->
                    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="liquid-glass" style="background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.88) 50%, rgba(250,249,246,0.92) 100%); border-radius: 28px; border: 1px solid rgba(107, 143, 119, 0.12); box-shadow: 0 2px 4px rgba(45, 41, 38, 0.03), 0 8px 16px rgba(45, 41, 38, 0.04), 0 24px 48px rgba(45, 41, 38, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.8);">
                      <tr>
                        <td>
                          <!-- Shimmer overlay -->
                          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 30%, transparent 70%, rgba(255,255,255,0.2) 100%); border-radius: 28px;">
                            <tr>
                              <td class="content-padding" style="padding: 48px 44px;">
                                {% block content %}{% endblock %}
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top: 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td align="center" style="font-family: 'DM Sans', -apple-system, sans-serif; font-size: 13px; line-height: 1.6; color: #7A7470;">
                    <p style="margin: 0 0 12px 0;">
                      Made with 💚 by <strong style="color: #5A7D66;">Nutree</strong>
                    </p>
                    <p style="margin: 0 0 8px 0; font-size: 12px; color: #9BA8A3;">
                      Helping you eat better, one meal at a time
                    </p>
                    <p style="margin: 0;">
                      <a href="{{ unsubscribe_url | default('#') }}" style="color: #9BA8A3; text-decoration: underline; font-size: 12px;">Unsubscribe</a>
                      <span style="color: #D8D3CE; padding: 0 8px;">·</span>
                      <a href="https://app.nutree.app/settings/notifications?source=email" style="color: #9BA8A3; text-decoration: underline; font-size: 12px;">Email preferences</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
